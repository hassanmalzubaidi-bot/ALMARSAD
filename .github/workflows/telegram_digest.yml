name: Telegram Daily Digest

# الموجز اليومي بعد جولة النشر المسائية (8:00 مساءً الرياض = 17:00 UTC)
on:
  schedule:
    - cron: '17 6 * * *'    # 9:17 صباحًا بتوقيت الرياض — بعد جولة النشر الصباحية
    - cron: '40 17 * * *'   # 8:40 مساءً بتوقيت الرياض — بعد جولة النشر المسائية
  workflow_dispatch:
    inputs:
      mode:
        description: 'diagnose (معاينة دون إرسال) أو send'
        required: false
        default: 'send'
      chat_id:
        description: 'معرّف محادثة اختياري للاختبار اليدوي (يغني عن سر CHAT_ID)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Send digest
        env:
          # يقبل الاسمين: TELEGRAM_TOKEN أو TK (الاسم الذي أضافه المالك)
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN || secrets.TK }}
          # الوجهة الافتراضية: قناة المرصد العامة @AlmarsadME (معرّف علني بطبيعته —
          # قرار المالك عدم استخدام معرّفات خاصة هنا). يمكن تجاوزه بسر CHAT_ID أو مُدخل يدوي.
          CHAT_ID: ${{ secrets.CHAT_ID || github.event.inputs.chat_id || '@AlmarsadME' }}
          DIGEST_MODE: ${{ github.event.inputs.mode || 'send' }}
        run: python pipeline/telegram_digest.py
