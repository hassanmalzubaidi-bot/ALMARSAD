name: Telegram Daily Digest

# الموجز اليومي بعد جولة النشر المسائية (8:00 مساءً الرياض = 17:00 UTC)
on:
  schedule:
    - cron: '40 17 * * *'   # 8:40 مساءً بتوقيت الرياض
  workflow_dispatch:
    inputs:
      mode:
        description: 'diagnose (معاينة دون إرسال) أو send'
        required: false
        default: 'send'

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Send digest
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DIGEST_MODE: ${{ github.event.inputs.mode || 'send' }}
        run: python pipeline/telegram_digest.py
